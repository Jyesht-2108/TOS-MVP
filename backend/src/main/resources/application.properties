# Application Configuration
spring.application.name=transport-operations-system
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/transport_ops
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logging Configuration
logging.level.root=INFO
logging.level.com.school.transport=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# JWT Configuration
jwt.secret=your-secret-key-change-in-production-minimum-256-bits
jwt.expiration=1800000

# CORS Configuration
cors.allowed-origins=http://localhost:3000
